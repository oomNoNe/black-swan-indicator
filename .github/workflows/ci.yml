name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from Actions tab

jobs:
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Smoke test imports
        run: |
          python -c "
          from data.market_crawler import get_current_vix, fetch_historical_data
          from data.news_crawler import fetch_financial_news
          from engine.ai_model import SentimentAnalyzer
          from engine.backtester import run_advanced_backtest
          from engine.regime_detector import classify_market_regime
          from engine.ml_predictor import VIXForecaster
          from ui.components import draw_gauge_chart, draw_vix_history_chart
          print('All imports OK')
          "

  lint:
    name: Lint with ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check . --select=E,F,W --ignore=E501,W291,W293 || true
        # Non-blocking for now — add as project matures
